# deploy/nginx/conf.d/media.conf
# HTTPS block is added automatically by: certbot --nginx -d media.yourdomain.com
# Before certbot: only HTTP serves the ACME challenge
# active.conf symlink is swapped by deploy.sh for blue/green switching
include /opt/media-server/nginx/upstream/active.conf;

server {
    listen 80;
    server_name media.yourdomain.com;

    client_max_body_size 100m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Certbot will add HTTPS redirect here
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
