# deploy/nginx/conf.d/registry.conf
# HTTPS block is added automatically by: certbot --nginx -d registry.yourdomain.com
# Before certbot: only HTTP serves the ACME challenge

server {
    listen 80;
    server_name registry.yourdomain.com;

    client_max_body_size 2g;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Certbot will add HTTPS redirect here
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;

        auth_basic "Registry";
        auth_basic_user_file /opt/media-server/registry/auth/htpasswd;
    }
}
