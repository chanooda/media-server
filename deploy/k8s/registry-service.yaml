# deploy/k8s/registry-service.yaml
# 호스트에서 Docker로 실행 중인 레지스트리(127.0.0.1:5000)를 k8s에서 접근하기 위한 설정
# NODE_IP는 server-setup.sh 실행 후 자동 설정됨
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: media-server
spec:
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: registry
  namespace: media-server
subsets:
  - addresses:
      - ip: NODE_IP_PLACEHOLDER
    ports:
      - port: 5000
