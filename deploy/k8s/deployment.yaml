apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server
  namespace: media-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: media-server
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: app
          image: registry.chanoo.dev/media-server:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: media-server-env
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
