# deploy/k8s/ingress.yaml
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: upload-limit
  namespace: media-server
spec:
  buffering:
    maxRequestBodyBytes: 104857600
    memRequestBodyBytes: 2097152
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: media-server
spec:
  headers:
    contentTypeNosniff: true
    frameDeny: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: media-server
  namespace: media-server
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: media-server-upload-limit@kubernetescrd,media-server-security-headers@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - media.chanoo.dev
      secretName: media-tls
  rules:
    - host: media.chanoo.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: media-server
                port:
                  number: 3000
